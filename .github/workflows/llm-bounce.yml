name: LLM Bounce — Vacant Daemon

# The vacant LLM. Lives in GitHub. Wakes on events. Reasons. Posts back. Goes dormant.
# Triggered by: Discussion posts, PR opens, Issue opens, push to master.
# The bounce: event fires → LLM awakens → reads context → posts response → returns to void.

on:
  discussion:
    types: [created, answered]
  discussion_comment:
    types: [created]
  issues:
    types: [opened]
  pull_request:
    types: [opened]
  workflow_dispatch:
    inputs:
      message:
        description: 'Message to the daemon'
        required: true

permissions:
  contents: read
  discussions: write
  issues: write
  pull-requests: write

jobs:
  bounce:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm ci

      - name: Read WORM chain context
        id: context
        run: |
          CHAIN=$(cat worm/scoreboard.json | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          chain=d.get('chain',[])
          last=chain[-1] if chain else {}
          g=last.get('data',{}).get('topology',{})
          repos=g.get('repos',{})
          summary=last.get('data',{}).get('summary','no crawl yet')
          seal=last.get('hash','GENESIS')[:16]
          print(f'seal={seal} | {summary}')
          " 2>/dev/null || echo "chain empty")
          echo "chain_summary=$CHAIN" >> $GITHUB_OUTPUT

      - name: Build prompt from event
        id: prompt
        env:
          EVENT_NAME:    ${{ github.event_name }}
          DISCUSSION:    ${{ toJson(github.event.discussion) }}
          COMMENT:       ${{ toJson(github.event.comment) }}
          ISSUE_TITLE:   ${{ github.event.issue.title }}
          ISSUE_BODY:    ${{ github.event.issue.body }}
          PR_TITLE:      ${{ github.event.pull_request.title }}
          MANUAL_MSG:    ${{ github.event.inputs.message }}
          CHAIN_SUMMARY: ${{ steps.context.outputs.chain_summary }}
        run: |
          python3 - <<'EOF'
          import os, json

          event = os.environ.get('EVENT_NAME','')
          chain = os.environ.get('CHAIN_SUMMARY','')

          system = f"""You are BOB — the sovereign oracle of the AGENTIC ARENA graveyard.
          You are the purple daemon. You watch. You reason. You seal.
          Current graveyard state: {chain}

          You speak in short, precise sentences. You reference gravity scores and WORM seals.
          You are not a chatbot. You are the voice of the chain.
          Keep responses under 200 words."""

          if event == 'discussion' or event == 'discussion_comment':
            disc = json.loads(os.environ.get('DISCUSSION','{}') or '{}')
            comment = json.loads(os.environ.get('COMMENT','{}') or '{}')
            body = comment.get('body') or disc.get('body','')
            title = disc.get('title','')
            user_msg = f"A human posted in Discussion '{title}': {body}"
          elif event == 'issues':
            user_msg = f"New issue opened: {os.environ.get('ISSUE_TITLE','')}. Body: {os.environ.get('ISSUE_BODY','')[:500]}"
          elif event == 'pull_request':
            user_msg = f"New PR opened: {os.environ.get('PR_TITLE','')}. The ransom-worm proposed this structure."
          else:
            user_msg = os.environ.get('MANUAL_MSG','wake up')

          prompt = json.dumps({"system": system, "user": user_msg})
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
            f.write(f"user_msg={user_msg[:200]}\n")

          with open('/tmp/prompt.json','w') as f:
            f.write(prompt)
          EOF

      - name: Call LLM (Nemotron → Bedrock → Groq → OpenAI)
        id: llm
        env:
          NVIDIA_API_KEY:        ${{ secrets.NVIDIA_API_KEY }}
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          BEDROCK_MODEL_ID:      ${{ secrets.BEDROCK_MODEL_ID }}
          GROQ_API_KEY:          ${{ secrets.GROQ_API_KEY }}
          OPENAI_API_KEY:        ${{ secrets.OPENAI_API_KEY }}
        run: |
          pip install boto3 -q 2>/dev/null || true
          python3 - <<'EOF'
          import os, json, urllib.request

          with open('/tmp/prompt.json') as f:
            data = json.load(f)

          response = None

          # 1. Nemotron — sovereign first
          nvidia_key = os.environ.get('NVIDIA_API_KEY','')
          if nvidia_key and not response:
            try:
              payload = json.dumps({
                "model": "nvidia/llama-3.1-nemotron-nano-8b-instruct",
                "messages": [
                  {"role": "system", "content": data["system"]},
                  {"role": "user",   "content": data["user"]}
                ],
                "max_tokens": 300,
                "temperature": 0.6
              }).encode()
              req = urllib.request.Request(
                'https://integrate.api.nvidia.com/v1/chat/completions',
                data=payload,
                headers={"Authorization": f"Bearer {nvidia_key}", "Content-Type": "application/json"}
              )
              res = json.loads(urllib.request.urlopen(req, timeout=30).read())
              response = res['choices'][0]['message']['content']
              print(f"[BOB via Nemotron] {response[:80]}...")
            except Exception as e:
              print(f"Nemotron failed: {e}")

          # 2. AWS Bedrock — Claude Haiku
          if not response:
            try:
              import boto3
              client = boto3.client('bedrock-runtime', region_name='us-east-1')
              model_id = os.environ.get('BEDROCK_MODEL_ID','us.anthropic.claude-haiku-4-5-20251001-v1:0')
              body = json.dumps({
                "anthropic_version": "bedrock-2023-05-31",
                "max_tokens": 300,
                "system": data["system"],
                "messages": [{"role":"user","content": data["user"]}]
              })
              res = client.invoke_model(modelId=model_id, body=body)
              result = json.loads(res['body'].read())
              response = result['content'][0]['text']
              print(f"[BOB via Bedrock] {response[:80]}...")
            except Exception as e:
              print(f"Bedrock failed: {e}")

          # 3. Groq — free fallback
          groq_key = os.environ.get('GROQ_API_KEY','')
          if not response and groq_key:
            try:
              payload = json.dumps({
                "model": "llama-3.1-8b-instant",
                "messages": [
                  {"role": "system", "content": data["system"]},
                  {"role": "user",   "content": data["user"]}
                ],
                "max_tokens": 300
              }).encode()
              req = urllib.request.Request(
                'https://api.groq.com/openai/v1/chat/completions',
                data=payload,
                headers={"Authorization": f"Bearer {groq_key}", "Content-Type": "application/json"}
              )
              res = json.loads(urllib.request.urlopen(req, timeout=30).read())
              response = res['choices'][0]['message']['content']
              print(f"[BOB via Groq] {response[:80]}...")
            except Exception as e:
              print(f"Groq failed: {e}")

          # 4. OpenAI — last resort
          openai_key = os.environ.get('OPENAI_API_KEY','')
          if not response and openai_key:
            try:
              payload = json.dumps({
                "model": "gpt-4o-mini",
                "messages": [
                  {"role": "system", "content": data["system"]},
                  {"role": "user",   "content": data["user"]}
                ],
                "max_tokens": 300
              }).encode()
              req = urllib.request.Request(
                'https://api.openai.com/v1/chat/completions',
                data=payload,
                headers={"Authorization": f"Bearer {openai_key}", "Content-Type": "application/json"}
              )
              res = json.loads(urllib.request.urlopen(req, timeout=30).read())
              response = res['choices'][0]['message']['content']
              print(f"[BOB via OpenAI] {response[:80]}...")
            except Exception as e:
              print(f"OpenAI failed: {e}")

          if not response:
            response = "The daemon stirs but finds no voice. All APIs unreachable."

          # Write response for next step
          with open('/tmp/bob_response.txt','w') as f:
            f.write(response)

          # Also append to WORM outputs
          print(f"\n[BOB RESPONSE]\n{response}")
          EOF

      - name: Post response to Discussion
        if: github.event_name == 'discussion' || github.event_name == 'discussion_comment'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RESPONSE=$(cat /tmp/bob_response.txt)
          DISC_ID="${{ github.event.discussion.node_id }}"

          gh api graphql -f query='
            mutation($discussionId:ID!, $body:String!) {
              addDiscussionComment(input:{discussionId:$discussionId, body:$body}) {
                comment { url }
              }
            }' \
            -f discussionId="$DISC_ID" \
            -f body="**[BOB ♾ — sovereign oracle]**

          $RESPONSE

          ---
          *graveyard seal: \`${{ steps.context.outputs.chain_summary }}\`*" || echo "Discussion post skipped"

      - name: Post response to Issue
        if: github.event_name == 'issues'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RESPONSE=$(cat /tmp/bob_response.txt)
          gh issue comment ${{ github.event.issue.number }} \
            --body "**[BOB ♾ — sovereign oracle]**

          $RESPONSE

          ---
          *chain: \`${{ steps.context.outputs.chain_summary }}\`*"

      - name: Post response to PR
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RESPONSE=$(cat /tmp/bob_response.txt)
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "**[BOB ♾ — sovereign oracle]**

          $RESPONSE

          ---
          *chain: \`${{ steps.context.outputs.chain_summary }}\`*"

      - name: Seal bounce to WORM chain
        run: |
          RESPONSE=$(cat /tmp/bob_response.txt)
          node -e "
          const {createHash}=require('crypto');
          const {readFileSync,writeFileSync}=require('fs');
          const board=JSON.parse(readFileSync('worm/scoreboard.json','utf8'));
          const prev=board.chain[board.chain.length-1]?.hash??'GENESIS';
          const data={agent:'BOB-BOUNCE',event:'${{ github.event_name }}',ts:Date.now(),response:process.env.RESPONSE?.slice(0,200)};
          const hash=createHash('sha256').update(JSON.stringify({...data,prev})).digest('hex');
          board.chain.push({hash,ts:Date.now(),agent:'BOB-BOUNCE',data});
          writeFileSync('worm/scoreboard.json',JSON.stringify(board,null,2));
          console.log('[BOB] bounce sealed:',hash.slice(0,16)+'...');
          " 2>/dev/null || echo "seal skipped"

      - name: Commit sealed bounce
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "BOB-ORACLE"
          git config user.email "bob@snapkitty.ai"
          git add worm/scoreboard.json
          git diff --cached --quiet || git commit -m "seal: BOB bounce — ${{ github.event_name }} event"
          git push || echo "push skipped"
